name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
        env:
          # Set repo variable VITE_MOBIX_PROXY to the Cloudflare Worker URL.
          VITE_MOBIX_PROXY: ${{ vars.VITE_MOBIX_PROXY }}
          # Public image origin (no auth needed for <img>).
          VITE_MOBIX_IMAGE_BASE: ${{ vars.VITE_MOBIX_IMAGE_BASE || 'https://mobix.motovax.com' }}

      - name: SPA fallback (client-side routing on Pages)
        run: cp dist/index.html dist/404.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
