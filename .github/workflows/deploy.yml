name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
        env:
          VITE_MOBIX_API_KEY: ${{ vars.VITE_MOBIX_API_KEY }}
          VITE_MOBIX_API_BASE: ${{ vars.VITE_MOBIX_API_BASE || 'https://mobix.motovax.com' }}
          VITE_MOBIX_IMAGE_BASE: ${{ vars.VITE_MOBIX_IMAGE_BASE || 'https://mobix.motovax.com' }}
          VITE_STRAPI_API_KEY: ${{ vars.VITE_STRAPI_API_KEY }}
          VITE_CMS_API_BASE: ${{ vars.VITE_CMS_API_BASE || 'https://api.mobixbydss.id/api' }}
          VITE_CMS_IMAGE_BASE: ${{ vars.VITE_CMS_IMAGE_BASE || 'https://api.mobixbydss.id' }}
          VITE_DSF_BEARER_TOKEN: ${{ vars.VITE_DSF_BEARER_TOKEN }}
          VITE_DSF_BASE_URL: ${{ vars.VITE_DSF_BASE_URL || 'https://simulation.dipostar.com' }}

      - name: SPA fallback (client-side routing on Pages)
        run: cp dist/index.html dist/404.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
