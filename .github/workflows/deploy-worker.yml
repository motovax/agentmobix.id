name: Deploy Cloudflare Worker

# Deploys the Mobix API proxy (worker/) and uploads the MOBIX_API_KEY secret to
# it from the GitHub Actions secret. Runs when worker/ changes or on demand.
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   CLOUDFLARE_API_TOKEN   - Cloudflare token with "Edit Workers" permission
#   CLOUDFLARE_ACCOUNT_ID  - your Cloudflare account id
#   MOBIX_API_KEY          - the Mobix bearer token (already set)
#   STRAPI_API_KEY         - the Strapi CMS bearer token

on:
  push:
    branches: [main]
    paths: ["worker/**"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy Worker
        working-directory: worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload MOBIX_API_KEY secret
        working-directory: worker
        run: echo "$MOBIX_API_KEY" | npx wrangler secret put MOBIX_API_KEY --name agentmobix-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          MOBIX_API_KEY: ${{ secrets.MOBIX_API_KEY }}

      - name: Upload STRAPI_API_KEY secret
        working-directory: worker
        run: echo "$STRAPI_API_KEY" | npx wrangler secret put STRAPI_API_KEY --name agentmobix-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          STRAPI_API_KEY: ${{ secrets.STRAPI_API_KEY }}
