name: Deploy Cloudflare Worker

# Deploys the Mobix API proxy (worker/) and uploads the MOBIX_API_KEY secret to
# it from the GitHub Actions secret. Runs when worker/ changes or on demand.
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   CLOUDFLARE_API_TOKEN   - Cloudflare token with "Edit Workers" permission
#   CLOUDFLARE_ACCOUNT_ID  - your Cloudflare account id
#   MOBIX_API_KEY          - the Mobix bearer token (already set)

on:
  push:
    branches: [main]
    paths: ["worker/**"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Worker + upload secret
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          secrets: |
            MOBIX_API_KEY
        env:
          MOBIX_API_KEY: ${{ secrets.MOBIX_API_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
