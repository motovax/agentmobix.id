name = "agentmobix-api"
main = "index.js"
compatibility_date = "2024-11-01"
workers_dev = true

# The Mobix bearer token is stored as a secret, NOT here:
#   npx wrangler secret put MOBIX_API_KEY
#
# Optional: bind a custom domain (e.g. api.agentmobix.id) in the Cloudflare
# dashboard (Workers & Pages -> your worker -> Settings -> Domains & Routes),
# or uncomment and adjust the route below if the zone is on Cloudflare:
#
# routes = [
#   { pattern = "api.agentmobix.id", custom_domain = true }
# ]
